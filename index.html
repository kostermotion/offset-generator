<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Offset (10 Mbps)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 500px; 
            margin: 40px auto; 
            padding: 20px; 
            background: #232323; 
            color: #ececec; 
            border-radius: 8px;
        }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        input, select, button { 
            display: block; width: 100%; margin-top: 5px; padding: 12px; 
            box-sizing: border-box; background: #333; color: white; 
            border: 1px solid #444; border-radius: 4px;
        }
        button { background: #0066cc; border: none; cursor: pointer; font-weight: bold; margin-top: 25px; }
        button:hover { background: #0077ee; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #ffcc00; text-align: center; font-weight: bold;}
        #downloadLink {
            display: block; margin-top: 15px; padding: 12px; background: #28a745; 
            color: white; text-align: center; text-decoration: none; border-radius: 4px; font-weight: bold;
        }
        #log {
            background: #111; padding: 10px; font-size: 11px; 
            color: #0f0; margin-top: 15px; border-radius: 4px;
            height: 150px; overflow-y: auto; font-family: monospace; border: 1px solid #444;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h2>Генератор видео (Эффект Offset)</h2>
    <p style="font-size: 13px; color: #888;">Создает зацикленное видео 10 Mbps.</p>

    <label>Исходное изображение:</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>Направление прокрутки:</label>
    <select id="direction">
        <option value="horizontal">По горизонтали</option>
        <option value="vertical">По вертикали</option>
    </select>

    <label>Длительность 1 цикла (секунд):</label>
    <input type="number" id="duration" value="5" min="1" max="60">

    <button id="renderBtn" disabled>Ожидание загрузки ядра...</button>

    <div id="status"></div>
    
    <label>Системные логи:</label>
    <div id="log"></div>
    
    <a id="downloadLink" style="display: none;">Скачать видео</a>

    <script>
        // Отлов критических ошибок синтаксиса
        window.onerror = function(msg, url, line) {
            const logDiv = document.getElementById('log');
            if(logDiv) {
                logDiv.innerHTML += `<br><span style="color:red">ОШИБКА БРАУЗЕРА: ${msg} (строка ${line})</span><br>`;
                logDiv.scrollTop = logDiv.scrollHeight;
            }
            return false;
        };

        // Код выполняется ТОЛЬКО когда интерфейс отрисовался
        document.addEventListener("DOMContentLoaded", async () => {
            const logDiv = document.getElementById('log');
            
            function addLog(text) {
                logDiv.innerHTML += `> ${text}<br>`;
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            addLog("Интерфейс загружен. Проверка библиотек...");

            // Проверка, скачался ли скрипт FFmpeg с серверов
            if (typeof FFmpegWASM === 'undefined') {
                addLog('<span style="color:red">КРИТИЧЕСКАЯ ОШИБКА: Библиотека FFmpeg не найдена. Возможно, ваш провайдер блокирует CDN (jsdelivr) или работает блокировщик рекламы.</span>');
                return;
            }

            addLog("Библиотеки подключены. Инициализация однопоточного ядра v0.12...");

            const { FFmpeg } = FFmpegWASM;
            const { fetchFile, toBlobURL } = FFmpegUtil;
            const ffmpeg = new FFmpeg();
            const renderBtn = document.getElementById('renderBtn');
            const statusDiv = document.getElementById('status');
            const downloadLink = document.getElementById('downloadLink');

            ffmpeg.on('log', ({ message }) => { addLog(`[FFmpeg] ${message}`); });

            try {
                const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
                
                addLog("Скачивание файлов ядра (около 30 МБ)...");
                
                const coreURL = await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript');
                const wasmURL = await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm');

                await ffmpeg.load({
                    coreURL: coreURL,
                    wasmURL: wasmURL
                });

                addLog('<span style="color:#28a745">ГОТОВО: Ядро успешно загружено!</span>');
                renderBtn.disabled = false;
                renderBtn.innerText = "Сгенерировать видео";
            } catch (e) {
                addLog(`<span style="color:red">ОШИБКА ЗАГРУЗКИ ЯДРА: ${e.message}</span>`);
                statusDiv.innerText = "Ошибка запуска.";
                statusDiv.style.color = "red";
            }

            // Логика кнопки кодирования
            renderBtn.addEventListener('click', async () => {
                const fileInput = document.getElementById('imageInput').files[0];
                if (!fileInput) {
                    alert('Выберите изображение!');
                    return;
                }

                renderBtn.disabled = true;
                downloadLink.style.display = 'none';
                statusDiv.innerText = "Подготовка...";
                statusDiv.style.color = "#ffcc00";

                const direction = document.getElementById('direction').value;
                const duration = parseInt(document.getElementById('duration').value);
                const fps = 30; 
                
                const speed = (1 / (duration * fps)).toFixed(6);
                const scrollFilter = direction === 'horizontal' ? `scroll=h=${speed}:v=0` : `scroll=h=0:v=${speed}`;

                ffmpeg.on('progress', ({ progress }) => {
                    const percent = Math.round(progress * 100);
                    if(percent >= 0 && percent <= 100) {
                        statusDiv.innerText = `Рендеринг: ${percent}%`;
                    }
                });

                try {
                    addLog("Обработка файла...");
                    const inputName = 'input.jpg';
                    await ffmpeg.writeFile(inputName, await fetchFile(fileInput));

                    addLog(`Запуск кодирования...`);
                    await ffmpeg.exec([
                        '-loop', '1',
                        '-i', inputName,
                        '-vf', `${scrollFilter},format=yuv420p`,
                        '-c:v', 'libx264',
                        '-b:v', '10M',
                        '-maxrate', '10M',
                        '-bufsize', '20M',
                        '-t', duration.toString(),
                        '-r', fps.toString(),
                        'output.mp4'
                    ]);

                    addLog("Сборка видеофайла...");
                    const data = await ffmpeg.readFile('output.mp4');
                    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

                    downloadLink.href = url;
                    downloadLink.download = `Offset_${direction}_${duration}sec.mp4`;
                    downloadLink.style.display = 'block';
                    
                    statusDiv.innerText = "Успешно!";
                    statusDiv.style.color = "#28a745";
                    addLog('<span style="color:#28a745">Завершено без ошибок.</span>');
                    
                } catch (err) {
                    addLog(`<span style="color:red">ОШИБКА РЕНДЕРА: ${err.message}</span>`);
                    statusDiv.innerText = "Сбой рендера.";
                    statusDiv.style.color = "#ff4444";
                } finally {
                    renderBtn.disabled = false;
                    renderBtn.innerText = "Сгенерировать еще раз";
                }
            });
        });
    </script>
</body>
</html>
