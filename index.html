<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Offset (10 Mbps)</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 500px; 
            margin: 40px auto; 
            padding: 20px; 
            background: #232323; 
            color: #ececec; 
            border-radius: 8px;
        }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        input, select, button { 
            display: block; width: 100%; margin-top: 5px; padding: 12px; 
            box-sizing: border-box; background: #333; color: white; 
            border: 1px solid #444; border-radius: 4px;
        }
        button { background: #0066cc; border: none; cursor: pointer; font-weight: bold; margin-top: 25px; }
        button:hover { background: #0077ee; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #ffcc00; text-align: center; font-weight: bold;}
        #downloadLink {
            display: block; margin-top: 15px; padding: 12px; background: #28a745; 
            color: white; text-align: center; text-decoration: none; border-radius: 4px; font-weight: bold;
        }
        #log {
            background: #111; padding: 10px; font-size: 11px; 
            color: #0f0; margin-top: 15px; border-radius: 4px;
            height: 150px; overflow-y: auto; font-family: monospace; border: 1px solid #444;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h2>Генератор видео (Эффект Offset)</h2>
    <p style="font-size: 13px; color: #888;">Создает зацикленное видео 10 Mbps.</p>

    <label>Исходное изображение:</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>Направление прокрутки:</label>
    <select id="direction">
        <option value="horizontal">По горизонтали</option>
        <option value="vertical">По вертикали</option>
    </select>

    <label>Длительность 1 цикла (секунд):</label>
    <input type="number" id="duration" value="5" min="1" max="60">

    <button id="renderBtn" disabled>Ожидание загрузки...</button>

    <div id="status"></div>
    
    <label>Системные логи:</label>
    <div id="log"></div>
    
    <a id="downloadLink" style="display: none;">Скачать видео</a>

    <script>
        // 1. Безопасный логгер (работает моментально)
        var logDiv = document.getElementById('log');
        function addLog(msg) {
            if (logDiv) {
                logDiv.innerHTML += '> ' + msg + '<br>';
                logDiv.scrollTop = logDiv.scrollHeight;
            }
        }

        // Перехват любых критических ошибок
        window.addEventListener('error', function(e) {
            addLog('<span style="color:red">КРИТИЧЕСКАЯ ОШИБКА: ' + e.message + '</span>');
        });

        addLog("1. Старт системы. Очистка кэша пройдена.");
        addLog("2. Подключение к серверам (Fastly CDN)...");

        // 2. Динамическая загрузка скриптов с отловом блокировок
        var script1 = document.createElement('script');
        script1.src = "https://fastly.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js";
        
        script1.onload = function() {
            addLog("3. Основная библиотека получена.");
            
            var script2 = document.createElement('script');
            script2.src = "https://fastly.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js";
            
            script2.onload = startApplication;
            
            script2.onerror = function() {
                addLog("<span style='color:red'>ОШИБКА: Провайдер заблокировал утилиты FFmpeg. Включите VPN.</span>");
            };
            document.body.appendChild(script2);
        };

        script1.onerror = function() {
            addLog("<span style='color:red'>ОШИБКА СЕТИ: Ваш интернет-провайдер блокирует доступ к скриптам JSDelivr. Пожалуйста, включите VPN и обновите страницу (Ctrl+F5).</span>");
            document.getElementById('status').innerText = "Блокировка провайдером.";
            document.getElementById('status').style.color = "red";
        };
        
        document.body.appendChild(script1);

        // 3. Главная логика приложения
        async function startApplication() {
            addLog("4. Инициализация видео-ядра v0.12...");
            
            const FFmpeg = FFmpegWASM.FFmpeg;
            const fetchFile = FFmpegUtil.fetchFile;
            const ffmpeg = new FFmpeg();

            const renderBtn = document.getElementById('renderBtn');
            const statusDiv = document.getElementById('status');
            const downloadLink = document.getElementById('downloadLink');

            ffmpeg.on('log', function(e) { addLog('[FFmpeg] ' + e.message); });

            try {
                // Прямые ссылки на стабильный сервер
                const coreBase = 'https://fastly.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
                const ffmpegBase = 'https://fastly.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd';

                await ffmpeg.load({
                    coreURL: coreBase + '/ffmpeg-core.js',
                    wasmURL: coreBase + '/ffmpeg-core.wasm',
                    classWorkerURL: ffmpegBase + '/814.ffmpeg.js'
                });

                addLog("<span style='color:#28a745'>5. СИСТЕМА УСПЕШНО ЗАПУЩЕНА И ГОТОВА!</span>");
                renderBtn.disabled = false;
                renderBtn.innerText = "Сгенерировать видео";

                // Обработчик кнопки
                renderBtn.onclick = async function() {
                    const fileInput = document.getElementById('imageInput').files[0];
                    if (!fileInput) {
                        alert('Выберите изображение!');
                        return;
                    }

                    renderBtn.disabled = true;
                    downloadLink.style.display = 'none';
                    statusDiv.innerText = "Идет подготовка...";
                    statusDiv.style.color = "#ffcc00";

                    const direction = document.getElementById('direction').value;
                    const duration = parseInt(document.getElementById('duration').value);
                    const fps = 30; 
                    
                    const speed = (1 / (duration * fps)).toFixed(6);
                    const scrollFilter = direction === 'horizontal' ? 'scroll=h=' + speed + ':v=0' : 'scroll=h=0:v=' + speed;

                    ffmpeg.on('progress', function(e) {
                        const percent = Math.round(e.progress * 100);
                        if(percent >= 0 && percent <= 100) {
                            statusDiv.innerText = "Рендеринг: " + percent + "%";
                        }
                    });

                    try {
                        addLog("Загрузка файла в память...");
                        const inputName = 'input.jpg';
                        await ffmpeg.writeFile(inputName, await fetchFile(fileInput));

                        addLog("Запуск кодировщика (10 Mbps)...");
                        await ffmpeg.exec([
                            '-loop', '1',
                            '-i', inputName,
                            '-vf', scrollFilter + ',format=yuv420p',
                            '-c:v', 'libx264',
                            '-b:v', '10M',
                            '-maxrate', '10M',
                            '-bufsize', '20M',
                            '-t', duration.toString(),
                            '-r', fps.toString(),
                            'output.mp4'
                        ]);

                        addLog("Выгрузка готового видео...");
                        const data = await ffmpeg.readFile('output.mp4');
                        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

                        downloadLink.href = url;
                        downloadLink.download = 'Offset_' + direction + '_' + duration + 'sec.mp4';
                        downloadLink.style.display = 'block';
                        
                        statusDiv.innerText = "Видео готово!";
                        statusDiv.style.color = "#28a745";
                        addLog("<span style='color:#28a745'>Успех!</span>");
                        
                    } catch (err) {
                        addLog("<span style='color:red'>ОШИБКА КОДИРОВАНИЯ: " + err.message + "</span>");
                        statusDiv.innerText = "Ошибка.";
                        statusDiv.style.color = "red";
                    } finally {
                        renderBtn.disabled = false;
                        renderBtn.innerText = "Сгенерировать еще раз";
                    }
                };

            } catch(e) {
                addLog("<span style='color:red'>ОШИБКА ЗАПУСКА ЯДРА: " + e.message + "</span>");
                statusDiv.innerText = "Сбой запуска.";
                statusDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
